version: '3.8'

services:

  db:
    image: mariadb:10.11
    container_name: cinemax_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: cinemax_plus
    volumes:
      - ./database_mariadb.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb", "-u", "root", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: cinemax_web
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: ""

volumes:
  db_data:
